<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nixie Tube Clock</title>
  </head>
  <body class="bg-black group">
    <main
      class="flex min-h-dvh flex-col items-center justify-center gap-8 p-4 sm:p-8"
    >
      <!-- Top: mode switch (clock / stopwatch / countdown). -->
      <nixie-switch id="mode-switch"></nixie-switch>
      <!--
        Middle: the time display. Light-DOM web component (see
        src/nixie/nixie-display.ts) so Tailwind utilities apply. Responsive
        sizing lives here: native 1440px wide, never wider than the viewport
        (max-w-full) and never taller than the available height — the min/calc
        term keeps the 460px row inside 100dvh minus ~20rem reserved for
        padding, the two gaps, and the switches above and below.
      -->
      <nixie-display
        class="w-[min(1440px,calc((100dvh-20rem)*1440/460))] max-w-full"
      ></nixie-display>
      <!--
        Bottom: mode-specific control. Both live here; index.ts shows exactly
        one per mode by toggling `hidden` on the wrappers (kept off the controls
        themselves, whose inline-flex would fight a display utility).
      -->
      <div id="clock-controls" class="w-fit">
        <!-- Clock mode → time representation. -->
        <nixie-switch id="representation-switch"></nixie-switch>
      </div>
      <div id="stopwatch-controls" class="hidden w-fit">
        <!-- Stopwatch mode → start / pause / reset. -->
        <nixie-buttons id="stopwatch-actions"></nixie-buttons>
      </div>
    </main>
  </body>
</html>
